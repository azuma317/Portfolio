\\n            \u003c/li\u003e\\n        \\n            \u003cli class=\\\"notion-bulleted_list_item notion-color-default\\\"\u003e\\n                Ansible\\n            \u003c/li\u003e\\n        \\n            \u003cli class=\\\"notion-bulleted_list_item notion-color-default\\\"\u003e\\n                Docker\\n            \u003c/li\u003e\\n        \\n            \u003cli class=\\\"notion-bulleted_list_item notion-color-default\\\"\u003e\\n                Serverless Framework\\n            \u003c/li\u003e\\n        \\n            \u003cli class=\\\"notion-bulleted_list_item notion-color-default\\\"\u003e\\n                Capistrano\\n            \u003c/li\u003e\\n        \\n            \u003cli class=\\\"notion-bulleted_list_item notion-color-default\\\"\u003e\\n                GitHub Actions\\n            \u003c/li\u003e\\n        \u003c/ul\u003e\\n            \u003ch3 class=\\\"notion-heading_3 notion-color-default\\\"\u003e\\n                Terraform\\n            \u003c/h3\u003e\\n        \\n            \u003cp\u003e\\n                Terraform は IaC を実現できるツールで AWS 上でサーバーを立てる際に使用しています。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                Terraform を書くときは module の構成で, かつ, Terraform Registry の \u003ca href=\\\"https://registry.terraform.io/namespaces/terraform-aws-modules\\\" class=\\\"notion-text-href\\\"\u003eTerraform AWS modules\u003c/a\u003e を使用しています。AWS modules を使用することで, 下記のようにコードの記述量が減らすことができます。\\n            \u003c/p\u003e\\n        \\n            \u003cdiv class=\\\"notion-code\\\"\u003e\\n                \u003cpre\u003e\u003ccode class=\\\"language-bash\\\"\u003e# NatGateway \u0026#12434;\u0026#20351;\u0026#29992;\u0026#12375;\u0026#12383; VPC\\nmodule \\\"vpc\\\" {\\n  source  = \\\"terraform-aws-modules/vpc/aws\\\"\\n  version = \\\"~\u0026#62; 5.0\\\"\\n\\n  name = local.vpc_name\\n  cidr = var.vpc_cidr\\n\\n  azs              = [\\\"ap-northeast-1a\\\", \\\"ap-northeast-1c\\\"]\\n  private_subnets  = var.private_subnets\\n  public_subnets   = var.public_subnets\\n  database_subnets = var.database_subnets\\n\\n  enable_nat_gateway = true\\n\\n  tags = local.tags\\n}\\n\\n# \u0026#12521;\u0026#12452;\u0026#12501;\u0026#12469;\u0026#12452;\u0026#12463;\u0026#12523;\u0026#12509;\u0026#12522;\u0026#12471;\u0026#12540;（\u0026#26368;\u0026#26032;\u0026#12398;5\u0026#12388;\u0026#12398;\u0026#12452;\u0026#12513;\u0026#12540;\u0026#12472;\u0026#12384;\u0026#12369;\u0026#27531;\u0026#12377;）\u0026#12434;\u0026#32771;\u0026#24942;\u0026#12375;\u0026#12383; ECR\\nmodule \\\"ecr\\\" {\\n  for_each = local.ecr_repositories\\n  source   = \\\"terraform-aws-modules/ecr/aws\\\"\\n  version  = \\\"~\u0026#62; 1.0\\\"\\n\\n  repository_name = each.value\\n\\n  repository_image_tag_mutability = \\\"MUTABLE\\\"\\n\\n  repository_lifecycle_policy = jsonencode({\\n    rules = [\\n      {\\n        action = {\\n          type = \\\"expire\\\"\\n        }\\n        description  = \\\"Keep last 5 images\\\"\\n        rulePriority = 1\\n        selection = {\\n          countNumber = 5\\n          countType   = \\\"imageCountMoreThan\\\"\\n          tagStatus   = \\\"any\\\"\\n        }\\n      },\\n    ]\\n  })\\n\\n  tags = local.tags\\n}\u003c/code\u003e\u003c/pre\u003e\\n                \\n            \u003c/div\u003e\\n        \\n            \u003ch3 class=\\\"notion-heading_3 notion-color-default\\\"\u003e\\n                Ansible\\n            \u003c/h3\u003e\\n        \\n            \u003cp\u003e\\n                Ansible は オンプレのサーバーや EC2 などのミドルウェアを IaC で管理できるツールです。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                Nginx や Firewall, Docker などの設定管理で使用します。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                ディレクトリ構成は, \u003ca href=\\\"https://docs.ansible.com/ansible/2.9_ja/user_guide/playbooks_best_practices.html\\\" class=\\\"notion-text-href\\\"\u003eAnsible のベストプラクティス\u003c/a\u003eを参考にして, 下記のような構成にしています。\\n            \u003c/p\u003e\\n        \\n            \u003cdiv class=\\\"notion-code\\\"\u003e\\n                \u003cpre\u003e\u003ccode class=\\\"language-bash\\\"\u003e.\\n\u0026#9500;\u0026#9472;\u0026#9472; hosts\\n\u0026#9474;\u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; production.yml\\n\u0026#9500;\u0026#9472;\u0026#9472; main.yml\\n\u0026#9500;\u0026#9472;\u0026#9472; private.yml\\n\u0026#9492;\u0026#9472;\u0026#9472; roles\\n    \u0026#9500;\u0026#9472;\u0026#9472; firewalld\\n    \u0026#9474;\u0026#160;\u0026#160; \u0026#9500;\u0026#9472;\u0026#9472; handlers\\n    \u0026#9474;\u0026#160;\u0026#160; \u0026#9474;\u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; main.yml\\n    \u0026#9474;\u0026#160;\u0026#160; \u0026#9500;\u0026#9472;\u0026#9472; tasks\\n    \u0026#9474;\u0026#160;\u0026#160; \u0026#9474;\u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; main.yml\\n    \u0026#9474;\u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; templates\\n    \u0026#9474;\u0026#160;\u0026#160;     \u0026#9492;\u0026#9472;\u0026#9472; public.xml.j2\\n    \u0026#9492;\u0026#9472;\u0026#9472; nginx\\n     \u0026#160;\u0026#160; \u0026#9500;\u0026#9472;\u0026#9472; handlers\\n     \u0026#160;\u0026#160; \u0026#9474;\u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; main.yml\\n     \u0026#160;\u0026#160; \u0026#9500;\u0026#9472;\u0026#9472; tasks\\n     \u0026#160;\u0026#160; \u0026#9474;\u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; main.yml\\n     \u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; templates\\n     \u0026#160;\u0026#160;     \u0026#9500;\u0026#9472;\u0026#9472; cert\\n     \u0026#160;\u0026#160;     \u0026#9474;\u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; server.crt.j2\\n     \u0026#160;\u0026#160;     \u0026#9500;\u0026#9472;\u0026#9472; conf.d\\n     \u0026#160;\u0026#160;     \u0026#9474;\u0026#160;\u0026#160; \u0026#9492;\u0026#9472;\u0026#9472; default.conf.j2\\n     \u0026#160;\u0026#160;     \u0026#9500;\u0026#9472;\u0026#9472; htpasswd.j2\\n     \u0026#160;\u0026#160;     \u0026#9500;\u0026#9472;\u0026#9472; nginx.conf.j2\\n     \u0026#160;\u0026#160;     \u0026#9492;\u0026#9472;\u0026#9472; private\\n     \u0026#160;\u0026#160;         \u0026#9492;\u0026#9472;\u0026#9472; server.key.j2\u003c/code\u003e\u003c/pre\u003e\\n                \\n            \u003c/div\u003e\\n        \\n            \u003cp\u003e\\n                Nginx の設定を例に記述方法を紹介します。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                下記の設定で, Nginx のインストールと設定ファイルの管理を行っています。j2 と呼ばれるテンプレートエンジンを使用することによって, 変数を埋め込んだ設定ファイルを管理することができます。\\n            \u003c/p\u003e\\n        \\n            \u003cdiv class=\\\"notion-code\\\"\u003e\\n                \u003cpre\u003e\u003ccode class=\\\"language-bash\\\"\u003e---\\n- name: install nginx\\n  dnf:\\n    name: nginx\\n    state: latest\\n- name: write the nginx config file\\n  template:\\n    src: \\\"{{ item  }}\\\"\\n    dest: \\\"/etc/nginx/{{ item | regex_replace('^.*templates/','') | regex_replace('.j2', '') }}\\\"\\n  with_fileglob:\\n    - \\\"../templates/*.j2\\\"\\n    - \\\"../templates/conf.d/*.j2\\\"\\n  notify:\\n    - restart nginx \u003c/code\u003e\u003c/pre\u003e\\n                \\n            \u003c/div\u003e\\n        \"}}]]}]],null],\"segment\":\"__PAGE__?{\\\"slug\\\":\\\"the-infrastructure-technology-i-use\\\"}\"},\"styles\":[]}],\"segment\":[\"slug\",\"the-infrastructure-technology-i-use\",\"d\"]},\"styles\":[]}],\"segment\":\"writing\"},\"styles\":[]}]}]\n"])</script><script>self.__next_f.push([1,"8:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n5:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script></body></html>
