e\\n        \\n            \u003cp\u003e\\n                詳細については, \u003ca href=\\\"https://nextjs.org/\\\" class=\\\"notion-text-href\\\"\u003eNext.js 公式ウェブサイト\u003c/a\u003eを参照してください。\\n            \u003c/p\u003e\\n        \\n            \u003ch3 class=\\\"notion-heading_3 notion-color-default\\\"\u003e\\n                Tailwind.css\\n            \u003c/h3\u003e\\n        \\n            \u003cp\u003e\\n                Tailwind.css は, 高度なカスタマイズ性を持つCSSフレームワークです。クラスベースのスタイリングを提供し, 独自のデザインシステムを構築することができます。Tailwind.css には, レスポンシブデザインやダークモードのサポートなど, さまざまな便利な機能が備わっています。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                詳細については, \u003ca href=\\\"https://tailwindcss.com/\\\" class=\\\"notion-text-href\\\"\u003eTailwind.css 公式ウェブサイト\u003c/a\u003eを参照してください。\\n            \u003c/p\u003e\\n        \\n            \u003ch3 class=\\\"notion-heading_3 notion-color-default\\\"\u003e\\n                Contentlayer\\n            \u003c/h3\u003e\\n        \\n            \u003cp\u003e\\n                Contentlayer は, 静的サイトジェネレーターの一部として使用される, データ駆動型のコンテンツ管理システム（CMS）です。今回は Notion をバックエンドとして使用し, Notion 上で作成したコンテンツを静的なウェブページとして生成します。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                Contentlayer は, コード内にスキーマを定義し, そのスキーマに基づいてコンテンツを取得することができます。これにより, ウェブサイトのコンテンツの管理と更新が簡単になります。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                詳細については, \u003ca href=\\\"https://contentlayer.dev/\\\" class=\\\"notion-text-href\\\"\u003eContentlayer 公式ウェブサイト\u003c/a\u003eを参照してください。\\n            \u003c/p\u003e\\n        \\n            \u003ch2 class=\\\"notion-heading_2 notion-color-default\\\"\u003e\\n                # 構成\\n            \u003c/h2\u003e\\n        \\n            \u003cp\u003e\\n                Notion を CMS として, Contentlayer で SSG のサイトを構築しています。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                Notion と Contentlayer の連携に関しては α版なので, 現状 Contentlayer の特定のバージョン（v0.3.2）でしか動かないようでした。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                Notion は下記のようなデータベースを使用してブログのコンテンツを管理しています。\\n            \u003c/p\u003e\\n        \\n            \u003cfigure class=\\\"notion-image\\\"\u003e\\n                \u003cimg src=\\\"https://prod-files-secure.s3.us-west-2.amazonaws.com/639b8c3a-cd78-457c-a299-7befe52d0fe2/6647f8a8-d5af-4927-920b-884934d77ce8/notion_screenshot.png?X-Amz-Algorithm=AWS4-HMAC-SHA256\u0026X-Amz-Content-Sha256=UNSIGNED-PAYLOAD\u0026X-Amz-Credential=AKIAT73L2G45EIPT3X45%2F20231001%2Fus-west-2%2Fs3%2Faws4_request\u0026X-Amz-Date=20231001T143957Z\u0026X-Amz-Expires=3600\u0026X-Amz-Signature=92291d041bd3682bfd887e3ee971ebdb9a6528906007ee1e1812e29aa09e7b5b\u0026X-Amz-SignedHeaders=host\u0026x-id=GetObject\\\" /\u003e\\n                \\n            \u003c/figure\u003e\\n        \\n            \u003cp\u003e\\n                現状, マークダウンから HTML を生成して, Tailwind の \u003cb class=\\\"notion-text-bold\\\"\u003etypography \u003c/b\u003eで CSS をあてている形なので, デザインや文字の大きさ, フォントなどを決めていきたいと思っています。\\n            \u003c/p\u003e\\n        \\n            \u003cp\u003e\\n                プログラムが気になる方は \u003ca href=\\\"https://github.com/azuma317/Portfolio\\\" class=\\\"notion-text-href\\\"\u003eGitHub\u003c/a\u003e にあげていますので, 参考にしてください。\\n            \u003c/p\u003e\\n        \"}}]]}]],null],\"segment\":\"__PAGE__?{\\\"slug\\\":\\\"how-i-build-my-website\\\"}\"},\"styles\":[]}],\"segment\":[\"slug\",\"how-i-build-my-website\",\"d\"]},\"styles\":[]}],\"segment\":\"writing\"},\"styles\":[]}]}]\n"])</script><script>self.__next_f.push([1,"8:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n5:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script></body></html>
